# LiteLLM — passerelle Groq avec failover automatique entre 2 clés.
# Deux "deployments" du MÊME model_name → LiteLLM répartit et, sur erreur 429
# (quota/rate-limit), met la clé fautive en cooldown et bascule sur l'autre.
#
# Lancer :  litellm --config _infra/litellm.config.yaml
# Sert sur : http://localhost:4000
#
# Les clés viennent de l'environnement — JAMAIS écrites ici.
#   export GROQ_API_KEY_1=...   (compte 1)
#   export GROQ_API_KEY_2=...   (compte 2)

model_list:
  - model_name: groq-llama-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1
  - model_name: groq-llama-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_2

router_settings:
  routing_strategy: simple-shuffle   # répartit sur les 2 clés
  num_retries: 3                     # retente avant d'abandonner
  allowed_fails: 1                   # 1 échec → cooldown de la clé
  cooldown_time: 60                  # secondes avant de réessayer la clé épuisée

litellm_settings:
  drop_params: true                  # ignore params non supportés → évite les bugs

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # protège le proxy local
